<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" width="800" height="300">
  <style>
    .box { fill: #ffffff; stroke: #d8dfe4; stroke-width: 1; rx: 8; ry: 8; }
    .box-hl { fill: #dce8ee; stroke: #d8dfe4; stroke-width: 1; rx: 8; ry: 8; }
    .label { font-family: 'Inter', sans-serif; font-size: 11px; fill: #1c2d38; text-anchor: middle; font-weight: 600; }
    .annot { font-family: 'JetBrains Mono', monospace; font-size: 8px; fill: #6b7f8e; text-anchor: middle; }
    .arrow { stroke: #4b6777; stroke-width: 1.5; fill: none; marker-end: url(#arrowhead); }
    .arrow-data { stroke: #6b7f8e; stroke-width: 1; fill: none; marker-end: url(#arrowhead-gray); stroke-dasharray: 4 2; }
    .store { fill: #f7f5f2; stroke: #d8dfe4; stroke-width: 1; rx: 8; ry: 8; }
    .store-label { font-family: 'Inter', sans-serif; font-size: 10px; fill: #4b6777; text-anchor: middle; font-weight: 500; }
    .title { font-family: 'Inter', sans-serif; font-size: 13px; fill: #3a5261; text-anchor: start; font-weight: 700; }
  </style>
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#4b6777" stroke-width="1"/>
    </marker>
    <marker id="arrowhead-gray" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#6b7f8e" stroke-width="1"/>
    </marker>
  </defs>

  <rect width="800" height="300" fill="#f7f5f2" rx="0"/>

  <text x="24" y="28" class="title">TeideDB Engine Pipeline</text>

  <!-- Pipeline boxes -->
  <!-- 1: SQL/PGQ Query -->
  <rect x="16" y="52" width="88" height="40" class="box-hl"/>
  <text x="60" y="76" class="label">SQL / PGQ</text>
  <text x="60" y="87" class="annot">Query</text>

  <!-- Arrow 1→2 -->
  <line x1="104" y1="72" x2="120" y2="72" class="arrow"/>

  <!-- 2: Parser -->
  <rect x="122" y="52" width="88" height="40" class="box"/>
  <text x="166" y="76" class="label">Parser</text>
  <text x="166" y="106" class="annot">sqlparser</text>
  <text x="166" y="116" class="annot">(DuckDB dialect)</text>

  <!-- Arrow 2→3 -->
  <line x1="210" y1="72" x2="226" y2="72" class="arrow"/>

  <!-- 3: PGQ Pre-parser -->
  <rect x="228" y="52" width="96" height="40" class="box"/>
  <text x="276" y="76" class="label">PGQ Pre-parser</text>
  <text x="276" y="106" class="annot">CREATE PROPERTY GRAPH</text>
  <text x="276" y="116" class="annot">GRAPH_TABLE</text>

  <!-- Arrow 3→4 -->
  <line x1="324" y1="72" x2="340" y2="72" class="arrow"/>

  <!-- 4: Planner -->
  <rect x="342" y="52" width="88" height="40" class="box"/>
  <text x="386" y="76" class="label">Planner</text>
  <text x="386" y="106" class="annot">SQL + Graph</text>
  <text x="386" y="116" class="annot">+ Vector ops</text>

  <!-- Arrow 4→5 -->
  <line x1="430" y1="72" x2="446" y2="72" class="arrow"/>

  <!-- 5: DAG -->
  <rect x="448" y="52" width="72" height="40" class="box-hl"/>
  <text x="484" y="76" class="label">DAG</text>
  <text x="484" y="106" class="annot">Lazy operation</text>
  <text x="484" y="116" class="annot">graph</text>

  <!-- Arrow 5→6 -->
  <line x1="520" y1="72" x2="536" y2="72" class="arrow"/>

  <!-- 6: Optimizer -->
  <rect x="538" y="52" width="88" height="40" class="box"/>
  <text x="582" y="76" class="label">Optimizer</text>
  <text x="582" y="106" class="annot">SIP, pushdown</text>
  <text x="582" y="116" class="annot">fusion, DCE</text>

  <!-- Arrow 6→7 -->
  <line x1="626" y1="72" x2="642" y2="72" class="arrow"/>

  <!-- 7: Executor -->
  <rect x="644" y="52" width="88" height="40" class="box"/>
  <text x="688" y="76" class="label">Executor</text>
  <text x="688" y="106" class="annot">Morsel-driven</text>
  <text x="688" y="116" class="annot">parallel</text>

  <!-- Arrow 7→8 -->
  <line x1="732" y1="72" x2="748" y2="72" class="arrow"/>

  <!-- 8: Result -->
  <rect x="750" y="57" width="36" height="30" class="box-hl"/>
  <text x="768" y="76" class="label" font-size="10">Result</text>

  <!-- Data stores section -->
  <text x="24" y="160" class="title" font-size="11">Data Stores</text>

  <!-- Store 1: Tables -->
  <rect x="160" y="172" width="140" height="44" class="store"/>
  <text x="230" y="192" class="store-label">Tables (columnar)</text>
  <text x="230" y="204" class="annot">td_table_t vectors</text>

  <!-- Store 2: CSR -->
  <rect x="330" y="172" width="140" height="44" class="store"/>
  <text x="400" y="192" class="store-label">CSR Indexes (graph)</text>
  <text x="400" y="204" class="annot">offsets + targets</text>

  <!-- Store 3: HNSW -->
  <rect x="500" y="172" width="140" height="44" class="store"/>
  <text x="570" y="192" class="store-label">HNSW Index (vector)</text>
  <text x="570" y="204" class="annot">multi-layer ANN</text>

  <!-- Dashed arrows from stores up to DAG -->
  <line x1="230" y1="172" x2="475" y2="95" class="arrow-data"/>
  <line x1="400" y1="172" x2="484" y2="95" class="arrow-data"/>
  <line x1="570" y1="172" x2="493" y2="95" class="arrow-data"/>

  <!-- Legend -->
  <rect x="24" y="248" width="752" height="36" fill="none" stroke="#d8dfe4" stroke-width="0.5" rx="6"/>
  <line x1="40" y1="268" x2="68" y2="268" class="arrow"/>
  <text x="74" y="271" class="annot" text-anchor="start">Control flow</text>
  <line x1="160" y1="268" x2="188" y2="268" class="arrow-data"/>
  <text x="194" y="271" class="annot" text-anchor="start">Data feed</text>
  <rect x="290" y="260" width="16" height="16" class="box-hl"/>
  <text x="312" y="271" class="annot" text-anchor="start">Key stage</text>
  <rect x="400" y="260" width="16" height="16" class="box"/>
  <text x="422" y="271" class="annot" text-anchor="start">Processing stage</text>
</svg>