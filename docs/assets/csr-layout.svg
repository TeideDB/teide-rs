<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 250" width="700" height="250">
  <style>
    .node { fill: #ffffff; stroke: #4b6777; stroke-width: 1.5; }
    .node-label { font-family: 'JetBrains Mono', monospace; font-size: 11px; fill: #1c2d38; text-anchor: middle; dominant-baseline: central; }
    .edge { stroke: #4b6777; stroke-width: 1.2; fill: none; marker-end: url(#arrowG); }
    .title { font-family: 'Inter', sans-serif; font-size: 13px; fill: #3a5261; font-weight: 700; }
    .arr-label { font-family: 'JetBrains Mono', monospace; font-size: 10px; fill: #4b6777; text-anchor: end; font-weight: 600; }
    .cell { fill: #ffffff; stroke: #d8dfe4; stroke-width: 1; }
    .cell-hl { fill: #dce8ee; stroke: #4b6777; stroke-width: 1; }
    .cell-val { font-family: 'JetBrains Mono', monospace; font-size: 11px; fill: #1c2d38; text-anchor: middle; dominant-baseline: central; }
    .idx { font-family: 'JetBrains Mono', monospace; font-size: 8px; fill: #6b7f8e; text-anchor: middle; }
    .annot { font-family: 'Inter', sans-serif; font-size: 9px; fill: #e89b50; font-weight: 500; }
    .bracket { stroke: #e89b50; stroke-width: 1; fill: none; }
  </style>
  <defs>
    <marker id="arrowG" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5" fill="none" stroke="#4b6777" stroke-width="1"/>
    </marker>
  </defs>

  <rect width="700" height="250" fill="#f7f5f2"/>

  <!-- Left: Visual graph -->
  <text x="20" y="24" class="title">Directed Graph</text>

  <!-- Nodes -->
  <circle cx="60" cy="60" r="16" class="node"/>
  <text x="60" y="60" class="node-label">0</text>

  <circle cx="140" cy="60" r="16" class="node"/>
  <text x="140" y="60" class="node-label">1</text>

  <circle cx="60" cy="140" r="16" class="node"/>
  <text x="60" y="140" class="node-label">2</text>

  <circle cx="180" cy="140" r="16" class="node"/>
  <text x="180" y="140" class="node-label">3</text>

  <circle cx="240" cy="80" r="16" class="node"/>
  <text x="240" y="80" class="node-label">4</text>

  <!-- Edges: 0→1 -->
  <line x1="76" y1="60" x2="122" y2="60" class="edge"/>
  <!-- 0→2 -->
  <line x1="60" y1="76" x2="60" y2="122" class="edge"/>
  <!-- 1→3 -->
  <line x1="150" y1="74" x2="170" y2="126" class="edge"/>
  <!-- 2→3 -->
  <line x1="76" y1="140" x2="162" y2="140" class="edge"/>
  <!-- 3→4 -->
  <line x1="192" y1="130" x2="228" y2="92" class="edge"/>

  <!-- Right: CSR arrays -->
  <text x="330" y="24" class="title">CSR Representation</text>

  <!-- Offsets array -->
  <text x="385" y="62" class="arr-label">offsets</text>
  <!-- Index row -->
  <text x="416" y="46" class="idx">0</text>
  <text x="448" y="46" class="idx">1</text>
  <text x="480" y="46" class="idx">2</text>
  <text x="512" y="46" class="idx">3</text>
  <text x="544" y="46" class="idx">4</text>
  <text x="576" y="46" class="idx">5</text>
  <!-- Cells -->
  <rect x="400" y="52" width="32" height="24" class="cell-hl"/>
  <text x="416" y="64" class="cell-val">0</text>
  <rect x="432" y="52" width="32" height="24" class="cell-hl"/>
  <text x="448" y="64" class="cell-val">2</text>
  <rect x="464" y="52" width="32" height="24" class="cell"/>
  <text x="480" y="64" class="cell-val">3</text>
  <rect x="496" y="52" width="32" height="24" class="cell"/>
  <text x="512" y="64" class="cell-val">4</text>
  <rect x="528" y="52" width="32" height="24" class="cell"/>
  <text x="544" y="64" class="cell-val">5</text>
  <rect x="560" y="52" width="32" height="24" class="cell"/>
  <text x="576" y="64" class="cell-val">5</text>

  <!-- Targets array -->
  <text x="385" y="132" class="arr-label">targets</text>
  <!-- Index row -->
  <text x="416" y="116" class="idx">0</text>
  <text x="448" y="116" class="idx">1</text>
  <text x="480" y="116" class="idx">2</text>
  <text x="512" y="116" class="idx">3</text>
  <text x="544" y="116" class="idx">4</text>
  <!-- Cells -->
  <rect x="400" y="122" width="32" height="24" class="cell-hl"/>
  <text x="416" y="134" class="cell-val">1</text>
  <rect x="432" y="122" width="32" height="24" class="cell-hl"/>
  <text x="448" y="134" class="cell-val">2</text>
  <rect x="464" y="122" width="32" height="24" class="cell"/>
  <text x="480" y="134" class="cell-val">3</text>
  <rect x="496" y="122" width="32" height="24" class="cell"/>
  <text x="512" y="134" class="cell-val">3</text>
  <rect x="528" y="122" width="32" height="24" class="cell"/>
  <text x="544" y="134" class="cell-val">4</text>

  <!-- Annotation: offsets[0]..offsets[1] = neighbors of node 0 -->
  <path d="M400,80 L400,90 L462,90 L462,80" class="bracket"/>
  <line x1="400" y1="90" x2="400" y2="118" class="bracket" marker-end="none" stroke-dasharray="3 2"/>
  <line x1="462" y1="90" x2="462" y2="118" class="bracket" marker-end="none" stroke-dasharray="3 2"/>

  <text x="400" y="104" class="annot">offsets[0]=0 .. offsets[1]=2</text>
  <text x="400" y="168" class="annot">targets[0..2] = {1, 2} = neighbors of node 0</text>

  <!-- General explanation -->
  <rect x="330" y="190" width="350" height="44" fill="none" stroke="#d8dfe4" stroke-width="0.5" rx="6"/>
  <text x="342" y="207" style="font-family:'Inter',sans-serif; font-size:9px; fill:#6b7f8e;">Neighbors of node i = targets[ offsets[i] .. offsets[i+1] ]</text>
  <text x="342" y="222" style="font-family:'Inter',sans-serif; font-size:9px; fill:#6b7f8e;">O(1) lookup, cache-friendly sequential access for BFS/traversal</text>
</svg>