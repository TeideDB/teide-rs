name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-and-test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            build_type: Debug
          - os: ubuntu-latest
            build_type: Release
          - os: macos-latest
            build_type: Debug
          - os: macos-latest
            build_type: Release

    steps:
      - uses: actions/checkout@v4

      - name: Install latest Clang
        if: runner.os == 'Linux'
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo apt-key add -
          sudo add-apt-repository -y "deb http://apt.llvm.org/$(lsb_release -cs)/ llvm-toolchain-$(lsb_release -cs) 19"
          sudo apt-get update
          sudo apt-get install -y clang-19
          echo "CC=clang-19" >> $GITHUB_ENV

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} -DTEIDE_WERROR=ON

      - name: Build
        run: cmake --build build

      - name: Test
        run: cd build && ctest --output-on-failure
